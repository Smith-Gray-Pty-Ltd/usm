name: Deploy docs to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy docs site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Generate docs
        # Generate the docs site from this repo's own .usm/ scope (dogfooding)
        # This repo's .usm/ is generated at first run via `usm init` (see init script below).
        run: |
          if [ ! -d ".usm" ]; then
            echo "No .usm/ found — running usm init"
            node dist/cli/index.js init --name "Universal System Map"
          fi
          node dist/cli/index.js scan --merge
          node dist/cli/index.js generate --output ./docs

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: usm-dev
          directory: ./docs
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Clean deploy on every push (the docs/ folder is regenerated)
          wranglerVersion: "3"
