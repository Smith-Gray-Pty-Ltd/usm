name: Deploy docs to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy docs site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Generate docs
        # Generate the docs site from this repo's own .usm/ scope (dogfooding)
        run: |
          if [ ! -d ".usm" ]; then
            echo "No .usm/ found — running usm init"
            node dist/cli/index.js init
          fi
          node dist/cli/index.js generate

      - name: Verify docs directory
        run: |
          ls -la .agents-workspace/docs/ | head -10
          echo "---"
          echo "Total files: $(find .agents-workspace/docs -type f | wc -l)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .agents-workspace/docs --project-name=usm-dev --branch=main --commit-dirty=true --commit-message="${{ github.event.head_commit.message }}"
