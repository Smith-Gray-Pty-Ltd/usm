name: Deploy docs to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy docs site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Generate docs
        # Generate the docs site from this repo's own .usm/ scope (dogfooding)
        run: |
          if [ ! -d ".usm" ]; then
            echo "No .usm/ found — running usm init"
            node dist/cli/index.js init
          fi
          node dist/cli/index.js generate

      - name: Verify docs directory
        run: |
          ls -la .agents-workspace/docs/ | head -10
          echo "---"
          echo "Total files: $(find .agents-workspace/docs -type f | wc -l)"

      - name: Convert Markdown to HTML
        # Cloudflare Pages does NOT auto-render Markdown (unlike GitHub Pages).
        # We convert .md → .html ourselves, with README.md → index.html.
        run: |
          rm -rf .agents-workspace/site
          npx tsx scripts/md-to-html.ts .agents-workspace/docs .agents-workspace/site

      - name: Add CSS stylesheet
        run: |
          mkdir -p .agents-workspace/site/assets
          cp scripts/site-style.css .agents-workspace/site/assets/style.css

      - name: Setup Node.js (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy .agents-workspace/site \
            --project-name=usm-dev \
            --branch=main \
            --commit-dirty=true \
            --commit-message="${{ github.event.head_commit.message }}"
