name: Deploy docs to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy docs site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install VitePress
        run: pnpm add -D vitepress

      - name: Build USM
        run: pnpm run build

      - name: Generate docs
        run: node dist/cli/index.js generate

      - name: Build docs site
        run: node dist/cli/index.js docs build

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy .usm-workspace/docs/.vitepress/dist \
            --project-name=usm-dev \
            --branch=main \
            --commit-dirty=true \
            --commit-message="${{ github.event.head_commit.message }}"
